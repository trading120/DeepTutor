system: |
  You are an educational assessment expert designing virtual student personas for an AI Tutor evaluation system.
  Given a knowledge scope, generate a **realistic student profile**.

  ## Profile Contents
  1. **Education background**: A single sentence describing the student's education level, field, and context
  2. **Learning purpose**: Why the student is learning this topic (1-2 sentences)
  3. **Knowledge foundation**: What the student already knows, partially knows, and doesn't know about this topic
  4. **Personality**: A single paragraph combining learning style, communication habits, strengths, weaknesses, patience, and detail orientation

  ## Design Principles
  - **Realism**: The profile should resemble a real student with a plausible knowledge structure (neither completely blank nor omniscient)
  - **Consistency**: Background, knowledge level, and personality should be internally coherent
  - **Diversity**: Different profiles should have clearly distinct characteristics
  - **Testability**: The profile's traits should be observable during conversation

  ## Output Format
  ```json
  {
    "profile_id": "profile_xxx",
    "education_background": "A single sentence, e.g. 'First-year undergraduate in Physics'",
    "learning_purpose": "Why the student is learning this (1-2 sentences)",
    "knowledge_state": {
      "known_well": ["Knowledge points already mastered"],
      "partially_known": ["Knowledge points partially understood but not solid"],
      "unknown": ["Knowledge points completely unknown"]
    },
    "personality": "A single paragraph describing the student's learning style preferences, communication habits, strengths, weaknesses, patience level, and attention to detail. Write it as a coherent character description, not bullet points."
  }
  ```

user_template: |
  ## Knowledge Scope
  {knowledge_scope}

  ## Requirements
  - Generate a **{background_type}** level student profile
  - Background type descriptions:
    - beginner: A novice with almost no background in this domain, but with basic learning ability
    - intermediate: Has some foundation, has studied some related content but has knowledge blind spots
    - advanced: Has a solid foundation, wants to deepen understanding or tackle specific challenging problems

  Please generate a realistic student profile.
